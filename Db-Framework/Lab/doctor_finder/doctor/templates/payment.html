{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width:500px;">
        <h3 class="text-center">Razorpay Payment</h3>

        <hr>

        <p><b>Patient:</b> {{ appointment.patient_name }}</p>
        <p><b>Doctor:</b> {{ appointment.doctor.name }}</p>
        <p><b>Amount:</b> ₹{{ appointment.doctor.fees }}</p>

        <button id="rzp-button1" class="btn btn-primary w-100">Pay with Razorpay</button>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ razorpay_key }}",
    "amount": "{{ amount }}",
    "currency": "INR",
    "name": "Doctor Finder",
    "description": "Appointment Payment",
    "order_id": "{{ razorpay_order_id }}",
    "callback_url": "{{ callback_url }}",
    "prefill": {
        "name": "{{ appointment.patient_name }}",
        "email": "{{ appointment.email }}",
        "contact": "{{ appointment.mobile }}"
    },
    "theme": {
        "color": "#0d6efd"
    }
};

var rzp1 = new Razorpay(options);

document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>
{% endblock %}
